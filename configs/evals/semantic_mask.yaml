app: semantic_mask
nodes: 1
tasks_per_node: 8
eval_name: DeepLearningSemantic
resume_checkpoint: true
data:
  dataset_train: data_jepa.csv
  dataset_val: /your_path_to_ssv2_val_csv_file_index.csv
  dataset_type: VideoDataset
  num_classes: 174
  frames_per_clip: 21
  num_segments: 1
  num_views_per_segment: 1
  frame_step: 1
optimization:
  attend_across_segments: true
  num_epochs: 20
  resolution: 224
  batch_size: 4
  weight_decay: 0.01
  lr: 0.001
  start_lr: 0.001
  final_lr: 0.0
  warmup: 0.
  use_bfloat16: true
pretrain:
  model_name: vit_small
  checkpoint_key: target_encoder
  clip_duration: null
  frames_per_clip: 22
  tubelet_size: 2
  uniform_power: true
  use_silu: false
  tight_silu: false
  use_sdpa: true
  patch_size: 16
  folder: /teamspace/studios/this_studio/jepa/
  checkpoint: vitsmall-latest.pth.tar # name of pretrained model file inside folder
  write_tag: jepa
